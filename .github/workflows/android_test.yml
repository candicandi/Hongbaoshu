name: Android Automated Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  # 1. Unit Tests (Fast, verify logic)
  unit_test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

  # 2. Emulator Matrix Tests (Verify compatibility on different Android Versions)
  emulator_test:
    name: API ${{ matrix.api-level }} Test
    needs: unit_test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 31, 34] # Android 10, 12, 14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumentation Tests (Emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload Emulator Test Reports
        if: always() # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: emulator-test-report-api-${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/

  # 3. Firebase Test Lab (Real Device - Samsung)
  # Requires 'FIREBASE_SERVICE_ACCOUNT' secret in GitHub Repo
  firebase_test:
    name: Samsung Real Device (FTL)
    needs: unit_test 
    runs-on: ubuntu-latest
    env:
      FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK for Testing
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Auth with Google Cloud
        if: env.FIREBASE_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        if: env.FIREBASE_KEY != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable Google Cloud APIs (Self-Repair)
        if: env.FIREBASE_KEY != ''
        run: |
          gcloud services enable testing.googleapis.com toolresults.googleapis.com cloudresourcemanager.googleapis.com --project hongbaoshu
          gcloud services list --enabled --project hongbaoshu | grep testing


      - name: Run Tests on Firebase Test Lab (Virtual Device)
        if: env.FIREBASE_KEY != ''
        run: |
          # Using 'redfin' (Pixel 5) virtual device - always available in Free Tier
          # Run 'gcloud firebase test android models list' to see all available models
          mkdir -p firebase-results
          gcloud firebase test android run \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=redfin,version=30,locale=zh_CN,orientation=portrait \
            --use-orchestrator \
            --results-dir=firebase-results/
      
      - name: Upload Firebase Test Artifacts
        if: always() && env.FIREBASE_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: firebase-results/
